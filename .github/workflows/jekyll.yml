name: Jekyll Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '2.7'
      - name: Install dependencies
        run: bundle install
      - name: Build site
        run: bundle exec jekyll build
      - name: Archive site
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site
      - name: HTMLProofer
        run: |
          bundle exec htmlproofer ./_site || true
      - name: Check CV link is a real file
        run: |
          cv_href=$(grep -oP '(?<=href=")[^"]+\.pdf' cara-brook.md | head -1)
          echo "CV link found: $cv_href"
          if [ -z "$cv_href" ]; then
            echo "ERROR: No PDF CV link found in cara-brook.md"
            exit 1
          fi
          cv_file="_site${cv_href}"
          if [ ! -f "$cv_file" ]; then
            echo "ERROR: CV file not found at $cv_file — the link in cara-brook.md is broken"
            exit 1
          fi
          echo "OK: CV file exists at $cv_file"
